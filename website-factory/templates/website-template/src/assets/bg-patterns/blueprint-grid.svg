<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <pattern id="blueprint-grid-minor" x="0" y="0" width="10" height="10" patternUnits="userSpaceOnUse">
      <path d="M10,0 L0,0 L0,10" fill="none" stroke="currentColor" stroke-width="0.5" opacity="0.16" />
    </pattern>
    <pattern id="blueprint-grid" x="0" y="0" width="50" height="50" patternUnits="userSpaceOnUse">
      <rect width="50" height="50" fill="url(#blueprint-grid-minor)" />
      <path d="M50,0 L0,0 L0,50" fill="none" stroke="currentColor" stroke-width="1.1" opacity="0.38" />
    </pattern>
  </defs>
  <rect width="100%" height="100%" fill="url(#blueprint-grid)" />
</svg>
